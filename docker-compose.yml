services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      # কন্টেইনারের ভেতর থেকে 'db' হোস্ট হিসেবে কাজ করবে
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hirepilot
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: hirepilot_postgres
    restart: unless-stopped
    # এই অংশটি যোগ করা হয়েছে যাতে লোকাল টার্মিনাল থেকে ডাটাবেজ কানেক্ট করা যায়
    ports:
      - "5432:5432" 
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hirepilot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: hirepilot_redis
    restart: unless-stopped
    # রেডিসকেও লোকাল থেকে চেক করতে চাইলে পোর্ট ওপেন করতে পারেন
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data: